<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Moovee">
<title>Moovee</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --paper: #ffffff;
    --accent: #e63946;
    --warm: #f4a261;
    --ui-bg: rgba(255,255,255,0.92);
    --shadow: 0 4px 20px rgba(0,0,0,0.15);
    --radius: 14px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #ffffff;
    font-family: 'DM Sans', sans-serif;
    touch-action: none;
  }

  /* Subtle paper texture lines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 27px,
      rgba(100,120,200,0.07) 28px
    );
    pointer-events: none;
    z-index: 0;
  }

  #canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
    touch-action: none;
    z-index: 1;
    background: transparent;
  }

  /* ── TIMER ── */
  #timer-wrap {
    background: var(--ui-bg);
    backdrop-filter: blur(8px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    width: 80px;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.1s;
  }
  #timer-wrap:active { transform: scale(0.96); }
  #timer-wrap.urgent { border-color: var(--accent); animation: pulse 0.7s ease infinite alternate; }
  @keyframes pulse { from { box-shadow: var(--shadow); } to { box-shadow: 0 0 0 4px rgba(230,57,70,0.25); } }

  #timer-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: #999;
  }
  #timer-display {
    font-family: 'Patrick Hand SC', cursive;
    font-size: 28px;
    color: var(--ink);
    line-height: 1;
    transition: color 0.3s;
  }
  #timer-wrap.urgent #timer-display { color: var(--accent); }
  #timer-hint {
    font-size: 9px;
    color: #bbb;
    letter-spacing: 0.05em;
  }

  /* ── TIMER AREA ── */
  #timer-area {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #btn-reset {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #1a1a2e;
    transition: transform 0.15s, background 0.15s;
  }
  #btn-reset:active { transform: scale(0.88) rotate(-30deg); }
  #btn-reset svg { width: 18px; height: 18px; }

  /* ── TOOL BUTTONS ── */
  #tools {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--ui-bg);
    backdrop-filter: blur(8px);
    border-radius: 50px;
    box-shadow: var(--shadow);
    padding: 10px 18px;
  }

  .tool-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    font-size: 20px;
    position: relative;
  }
  .tool-btn:active { transform: scale(0.9); }
  .tool-btn.active {
    background: var(--ink);
    border-color: var(--ink);
  }
  .tool-btn.active svg path,
  .tool-btn.active svg rect,
  .tool-btn.active svg circle,
  .tool-btn.active svg line { stroke: white; }
  .tool-btn svg { width: 22px; height: 22px; }

  /* Clear button - separate, danger color */
  #btn-clear {
    margin-left: 6px;
    padding-left: 18px;
    border-left: 1px solid rgba(0,0,0,0.1);
  }
  #btn-clear .tool-btn {
    background: rgba(230,57,70,0.08);
  }
  #btn-clear .tool-btn:hover { background: rgba(230,57,70,0.18); }
  #btn-clear .tool-btn svg path { stroke: var(--accent); }

  /* ── TIMER MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,46,0.55);
    backdrop-filter: blur(3px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  #modal-overlay.open { opacity: 1; pointer-events: all; }

  #modal {
    background: white;
    border-radius: 24px;
    padding: 32px 28px 24px;
    width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  }
  #modal-overlay.open #modal { transform: translateY(0) scale(1); }

  #modal h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 20px;
    text-align: center;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .preset-btn {
    background: var(--paper);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 10px 0;
    font-family: 'Patrick Hand SC', cursive;
    font-size: 16px;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .preset-btn:hover, .preset-btn.selected {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  .custom-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 20px;
  }
  .custom-row label {
    font-size: 13px;
    color: #888;
    white-space: nowrap;
  }
  #custom-input {
    flex: 1;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--ink);
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }
  #custom-input:focus { border-color: var(--ink); }

  .modal-actions {
    display: flex; gap: 10px;
  }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    color: #666;
    -webkit-appearance: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .modal-btn:active { transform: scale(0.97); }
  #modal-cancel { background: #f0f0f0; color: #666; }
  #modal-set {
    background: var(--ink);
    color: white;
  }

  /* ── DONE OVERLAY ── */
  #done-overlay {
    position: fixed; inset: 0;
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
  }
  #done-overlay.show { opacity: 1; pointer-events: all; }
  .done-speech-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: wobble 0.5s ease;
  }
  .done-bubble {
    position: relative;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 24px;
    padding: 16px 28px;
    max-width: 88vw;
  }
  .done-bubble-tail {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 24px solid var(--ink);
  }
  .done-bubble-tail::after {
    content: '';
    position: absolute;
    top: -27px;
    left: -11px;
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-top: 21px solid white;
  }
  #done-overlay .done-cow {
    font-size: 80px;
    line-height: 1;
    margin-top: 30px;
  }
  #done-overlay .done-text {
    font-family: 'Patrick Hand SC', cursive;
    font-size: 72px;
    color: var(--ink);
    line-height: 1;
  }
  #done-overlay .done-sub {
    font-size: 15px;
    color: #555;
    background: var(--ui-bg);
    padding: 10px 22px;
    border-radius: 30px;
    backdrop-filter: blur(8px);
  }
  @keyframes wobble {
    0% { transform: scale(0.5) rotate(-8deg); }
    60% { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  #btn-done-cancel {
    position: absolute;
    top: 24px; left: 24px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: white;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  #btn-done-cancel svg { width: 20px; height: 20px; display: block; margin: auto; }
  #btn-done-cancel:active { transform: rotate(90deg) scale(0.9); }
  #done-overlay.goodmoove #btn-done-cancel { display: flex; }

  /* Play button on Good moove screen */
  #btn-done-play {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: white;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2), 3px 3px 0 rgba(0,0,0,0.08);
    transition: transform 0.2s;
    margin-top: 8px;
  }
  #btn-done-play svg { width: 44px; height: 44px; display: block; margin: auto; }
  #btn-done-play:active { transform: scale(0.9); }
  #done-overlay.show #btn-done-play { display: flex; }

  /* ── DONE/CHECKMARK BUTTON ── */
  #btn-done-wrap {
    margin-left: 0;
  }
  #btn-done-wrap .tool-btn {
    background: rgba(42,157,92,0.08);
  }
  #btn-done-wrap .tool-btn:hover { background: rgba(42,157,92,0.18); }

  /* ── MOVIE CORNER BUTTON (inside left-area, vertically centered with reset) ── */
  #btn-movie-corner {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--ink);
    transition: transform 0.15s, background 0.15s;
  }
  #btn-movie-corner svg { fill: var(--ink); }
  #btn-movie-corner.on-movie { background: rgba(255,255,255,0.92); }
  #btn-movie-corner.on-movie svg { fill: var(--ink); }
  #btn-movie-corner:active { transform: scale(0.88); }

  /* ── LEFT AREA (movie btn vertically centered with reset btn) ── */
  #left-area {
    position: fixed;
    top: 25px; left: 16px;
    z-index: 45;
    display: flex;
    align-items: center;
  }

  /* ── MOVIE OVERLAY ── */
  #movie-overlay {
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    background: white;
  }
  #movie-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  /* Full-screen saved drawing */
  #movie-drawing-bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    display: none;
    background: white;
  }
  #movie-overlay.has-drawing #movie-drawing-bg { display: block; }

  /* Title bar — top of screen */
  #movie-title-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 25px 80px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    z-index: 2;
    display: none;
    align-items: center;
    justify-content: center;
    min-height: 98px;
  }
  #movie-overlay.has-drawing #movie-title-bar { display: flex; }
  #movie-title-text {
    font-family: 'Patrick Hand SC', cursive;
    font-size: clamp(22px, 6vw, 48px);
    color: var(--ink);
    text-align: center;
    line-height: 1.2;
    max-width: 88vw;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.06);
    animation: pop-in 0.35s cubic-bezier(.34,1.56,.64,1);
  }

  /* Centered title for no-drawing state */
  #movie-current-view {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  #movie-overlay.show #movie-current-view { pointer-events: all; }
  #movie-overlay.has-drawing #movie-current-view { display: none; }
  #movie-center-text {
    font-family: 'Patrick Hand SC', cursive;
    font-size: clamp(28px, 8vw, 64px);
    color: var(--ink);
    text-align: center;
    padding: 24px 32px;
    line-height: 1.25;
    max-width: 88vw;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.07);
    animation: pop-in 0.35s cubic-bezier(.34,1.56,.64,1);
  }

  /* unused history strip — kept for DOM compatibility */
  #movie-history-view, #movie-history-inner { display: none; }

  @keyframes pop-in {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* Nav buttons */
  #movie-nav-left {
    position: absolute;
    bottom: 100px;
    left: 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 3;
  }
  #btn-reload-movie, #btn-back-movie, #btn-forward-movie {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: transform 0.2s, opacity 0.2s;
  }
  #btn-reload-movie {
    position: absolute;
    bottom: 100px;
    right: 24px;
    z-index: 3;
  }
  #btn-reload-movie:active { transform: rotate(180deg) scale(0.9); }
  #btn-back-movie:active, #btn-forward-movie:active { transform: scale(0.9); }
  #btn-reload-movie svg, #btn-back-movie svg, #btn-forward-movie svg { width: 20px; height: 20px; display: block; margin: auto; }
  #btn-back-movie.hidden { opacity: 0; pointer-events: none; }
  #btn-back-movie.disabled { opacity: 0.35; pointer-events: none; background: #aaa; }
  #btn-forward-movie.hidden { opacity: 0; pointer-events: none; }


  /* ── GEAR / SETTINGS BUTTON ── */
  #btn-settings-movie {
    position: absolute;
    top: 24px; right: 24px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    color: var(--ink);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: transform 0.2s;
    z-index: 3;
  }
  #btn-settings-movie svg { width: 20px; height: 20px; display: block; margin: auto; }
  #btn-settings-movie:active { transform: rotate(60deg) scale(0.9); }
  #movie-overlay.show #btn-settings-movie { display: flex; }

  /* ── SETTINGS MODAL ── */
  #settings-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,46,0.55);
    backdrop-filter: blur(3px);
    z-index: 110;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  #settings-overlay.open { opacity: 1; pointer-events: all; }
  #settings-modal {
    background: white;
    border-radius: 24px;
    padding: 32px 28px 32px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  }
  #settings-overlay.open #settings-modal { transform: translateY(0) scale(1); }
  #settings-modal h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 20px;
    text-align: center;
  }
  .settings-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .settings-row label {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.04em;
  }
  .tmdb-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #tmdb-input {
    flex: 1;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #tmdb-input:focus { border-color: var(--ink); }
  #btn-tmdb-refresh {
    width: 36px; height: 36px;
    flex-shrink: 0;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.2s;
  }
  #btn-tmdb-refresh svg { width: 16px; height: 16px; display: block; margin: auto; }
  #btn-tmdb-refresh:active { transform: rotate(180deg) scale(0.9); }
  .modal-btn-primary {
    background: var(--ink) !important;
    color: white !important;
  }
  #tmdb-status {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    min-height: 18px;
    margin-bottom: 12px;
    text-align: center;
  }
  #tmdb-status.ok { color: #2a9d5c; }
  #tmdb-status.err { color: var(--accent); }
  #tmdb-status.loading { color: #999; }

  .settings-toggle-row {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .toggle-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: pointer;
  }
  .toggle-label span:first-child {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
  }
  .toggle-sub {
    font-size: 11px;
    color: #999;
    font-family: 'DM Sans', sans-serif;
  }
  .toggle-wrap {
    position: relative;
    width: 44px;
    height: 26px;
    flex-shrink: 0;
  }
  #family-friendly-toggle, #english-only-toggle, #show-reset-toggle {
    position: absolute;
    opacity: 0;
    width: 100%; height: 100%;
    margin: 0;
    cursor: pointer;
    z-index: 1;
  }
  .toggle-track {
    width: 44px; height: 26px;
    background: #ddd;
    border-radius: 13px;
    transition: background 0.2s;
    position: relative;
  }
  #family-friendly-toggle:checked + .toggle-track, #english-only-toggle:checked + .toggle-track, #show-reset-toggle:checked + .toggle-track { background: var(--ink); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  #family-friendly-toggle:checked + .toggle-track .toggle-thumb,
  #english-only-toggle:checked + .toggle-track .toggle-thumb,
  #show-reset-toggle:checked + .toggle-track .toggle-thumb {
    transform: translateX(18px);
  }


  /* ── POSTER POPUP ── */
  #poster-popup {
    position: fixed; inset: 0;
    z-index: 60;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  #poster-popup.show {
    opacity: 1;
    pointer-events: all;
  }
  #poster-popup-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    max-width: 88vw;
    animation: pop-in 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  #poster-img {
    max-width: min(320px, 80vw);
    max-height: 70vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    object-fit: contain;
    background: #222;
    display: block;
  }
  #poster-img.loading {
    width: min(280px, 75vw);
    height: min(420px, calc(75vw * 1.5));
    background: transparent;
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 12px;
    box-shadow: none;
  }
  #poster-title {
    font-family: 'Patrick Hand SC', cursive;
    font-size: 20px;
    color: white;
    text-align: center;
    max-width: 80vw;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }
  #poster-no-key {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 32px 24px;
    border-radius: 16px;
    border: 2px dashed rgba(255,255,255,0.3);
    max-width: 80vw;
    transition: border-color 0.2s;
  }
  #poster-no-key:active { border-color: rgba(255,255,255,0.7); }
  #poster-no-key-title {
    font-family: 'Patrick Hand SC', cursive;
    font-size: 28px;
    color: white;
    text-align: center;
    letter-spacing: 0.05em;
  }
  #poster-no-key-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    text-align: center;
  }
  /* Make both title text elements tappable */
  #movie-title-text, #movie-center-text {
    cursor: pointer;
  }
  #movie-title-text:hover, #movie-center-text:hover {
    opacity: 0.8;
  }

</style>

<!-- Tools -->
<div id="tools">
  <!-- Draw -->
  <button class="tool-btn active" id="btn-draw" aria-label="Draw" title="Draw">
    <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 14 C5 14 5 7 10 9 C15 11 15 17 20 14 C22 13 23 11 23 11"/>
    </svg>
  </button>

  <!-- Eraser -->
  <button class="tool-btn" id="btn-erase" aria-label="Eraser" title="Eraser">
    <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="9" width="18" height="9" rx="2" transform="rotate(-20 12 13.5)"/>
      <line x1="4" y1="20" x2="20" y2="20"/>
    </svg>
  </button>

  <div id="btn-clear">
    <button class="tool-btn" id="btn-clear-canvas" aria-label="Clear" title="Clear canvas">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </div>

  <div id="btn-done-wrap">
    <button class="tool-btn" id="btn-done" aria-label="Save and next movie" title="Save drawing and next movie">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2a9d5c" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </button>
  </div>
</div>

<!-- Movie title overlay -->
<div id="movie-overlay">
  <!-- Full-screen drawing background (shown when drawing exists) -->
  <img id="movie-drawing-bg" src="" alt="">
  <!-- Title bar at top (always shown) -->
  <div id="movie-title-bar">
    <div id="movie-title-text"></div>
  </div>
  <!-- Centered big title (shown when no drawing yet) -->
  <div id="movie-current-view">
    <div id="movie-center-text"></div>
  </div>
  <!-- DOM-only, unused visually -->
  <div id="movie-history-view"><div id="movie-history-inner"></div></div>
  <!-- Nav buttons -->
  <div id="movie-nav-left">

      </svg>
    </button>
    <button id="btn-forward-movie" title="Next title">
      <svg viewBox="7 4 10 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>
  <button id="btn-reload-movie" title="New title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <polyline points="1 20 1 14 7 14"/>

  </button>

<script>
// ── Canvas setup ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let tool = 'draw'; // 'draw' | 'erase'
let isDrawing = false;
let lastX = 0, lastY = 0;

function resize() {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.putImageData(imgData, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}
resize();
window.addEventListener('resize', resize);

function getPos(e) {
  if (e.touches) {
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    return [t.clientX - r.left, t.clientY - r.top];
  }
  return [e.offsetX, e.offsetY];
}

function startDraw(e) {
  e.preventDefault();
  // Don't draw if any overlay is showing
  if (movieOverlay.classList.contains('show') || doneOverlay.classList.contains('show')) return;
  // Auto-start timer if paused and time remains
  if (!timerRunning && remaining > 0) {
    startTimer();
    updateResetBtn();
  }
  isDrawing = true;
  [lastX, lastY] = getPos(e);
  ctx.beginPath();
  ctx.arc(lastX, lastY, tool === 'draw' ? 3 : 16, 0, Math.PI * 2);
  ctx.fillStyle = tool === 'draw' ? '#1a1a2e' : '#ffffff';
  ctx.fill();
}

function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const [x, y] = getPos(e);

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = tool === 'draw' ? '#1a1a2e' : '#ffffff';
  ctx.lineWidth = tool === 'draw' ? 6 : 32;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  [lastX, lastY] = [x, y];
}

function endDraw() { isDrawing = false; }

// Cancel any in-progress draw when touch/mouse is lifted anywhere
document.addEventListener('mouseup', endDraw);
document.addEventListener('touchend', endDraw);

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw);

// ── Tool buttons ──
document.getElementById('btn-draw').addEventListener('click', () => setTool('draw'));
document.getElementById('btn-erase').addEventListener('click', () => setTool('erase'));
document.getElementById('btn-clear-canvas').addEventListener('click', () => {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
});

function setTool(t) {
  tool = t;
  document.getElementById('btn-draw').classList.toggle('active', t === 'draw');
  document.getElementById('btn-erase').classList.toggle('active', t === 'erase');
}

// ── Timer ──
let totalSeconds = 60;
let remaining = 60;
let timerInterval = null;
let timerRunning = false;

const timerDisplay = document.getElementById('timer-display');
const timerWrap = document.getElementById('timer-wrap');

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function updateDisplay() {
  timerDisplay.textContent = fmt(remaining);
  timerWrap.classList.toggle('urgent', remaining <= 10 && remaining > 0);
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerRunning = true;
  timerInterval = setInterval(() => {
    remaining--;
    updateDisplay();
    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      showDone();
    }
  }, 1000);
}

const ICON_RESET = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;
const ICON_PLAY = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;

function updateResetBtn() {
  const btn = document.getElementById('btn-reset');
  if (timerRunning) {
    btn.innerHTML = ICON_RESET;
    btn.title = 'Reset';
    btn.dataset.mode = 'reset';
  } else {
    btn.innerHTML = ICON_PLAY;
    btn.title = 'Start';
    btn.dataset.mode = 'play';
  }
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  updateResetBtn();
}

function resetTimer(secs) {
  clearInterval(timerInterval);
  timerRunning = false;
  totalSeconds = secs;
  remaining = secs;
  updateDisplay();
  timerWrap.classList.remove('urgent');
  updateResetBtn();
}

updateDisplay();
// Start paused on load
updateResetBtn();

// Single tap on timer opens modal (handled below after showResetBtn is defined)

// ── Reset/Play button ──
document.getElementById('btn-reset').addEventListener('click', () => {
  const mode = document.getElementById('btn-reset').dataset.mode;
  if (mode === 'play') {
    if (remaining > 0) {
      startTimer();
      updateResetBtn();
    }
  } else {
    doneOverlay.classList.remove('show');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    resetTimer(totalSeconds);
  }
});

// ── Time's up ──
const doneOverlay = document.getElementById('done-overlay');
const doneText = doneOverlay.querySelector('.done-text');
const doneSub = doneOverlay.querySelector('.done-sub');

let doneMode = 'timesup'; // 'timesup' | 'goodmoove' | 'launch'

function showDone(mode) {
  doneMode = mode || 'timesup';
  doneOverlay.classList.remove('goodmoove');
  if (doneMode === 'timesup') {
    if (movieIndex >= 0) saveDrawingToIndex(movieIndex);
    doneText.style.fontSize = '';
    doneText.textContent = 'Moove on!';
    doneSub.textContent = 'Pass to the next player...';
  } else if (doneMode === 'goodmoove') {
    doneText.textContent = 'Good moove!';
    doneText.style.fontSize = '52px';
    doneSub.textContent = 'Pass to the next player...';
    doneOverlay.classList.add('goodmoove');
  } else if (doneMode === 'launch') {
    doneText.style.fontSize = '';
    doneText.textContent = 'Moovee!';
    doneSub.textContent = 'Tap to begin...';
  }
  doneOverlay.classList.add('show');
  updateResetBtn();
}

document.getElementById('btn-done-cancel').addEventListener('click', (e) => {
  e.stopPropagation();
  doneOverlay.classList.remove('show');
  doneOverlay.classList.remove('goodmoove');
  // Resume timer from where it was
  if (remaining > 0) {
    startTimer();
    updateResetBtn();
  }
});

document.getElementById('btn-done-play').addEventListener('click', (e) => {
  e.stopPropagation();
  isDrawing = false;
  // Run the action first (shows movie overlay), THEN hide done overlay for clean transition
  if (doneMode === 'goodmoove' || doneMode === 'timesup') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    resetTimer(totalSeconds);
  }
  showMovie();
  doneOverlay.classList.remove('show');
  doneOverlay.classList.remove('goodmoove');
});

doneOverlay.addEventListener('click', () => {
  doneOverlay.classList.remove('show');
  if (doneMode === 'timesup') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    resetTimer(totalSeconds);
    showMovie();
  } else if (doneMode === 'goodmoove') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    resetTimer(totalSeconds);
    showMovie();
  } else if (doneMode === 'launch') {
    showMovie();
  }
});

// ── Modal ──
const modal = document.getElementById('modal-overlay');
const presets = [30, 60, 90, 120, 180, 300];
let selectedPreset = 60;

const presetGrid = document.getElementById('presets');
presets.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn' + (s === 60 ? ' selected' : '');
  btn.textContent = fmt(s);
  btn.dataset.secs = s;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedPreset = s;

  presetGrid.appendChild(btn);
});

function openModal() {
  pauseTimer();
  modal.classList.add('open');
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  modal.classList.remove('open');
});

// ── Show Reset Button setting ──
let showResetBtn = localStorage.getItem('show_reset_btn') === 'true';

function applyResetBtnVisibility() {
  document.getElementById('btn-reset').style.display = showResetBtn ? '' : 'none';
}

// Populate toggle when timer modal opens
timerWrap.addEventListener('click', () => {
  document.getElementById('show-reset-toggle').checked = showResetBtn;
  openModal();
});

document.getElementById('modal-set').addEventListener('click', () => {
  // Save show-reset setting
  const newShowReset = document.getElementById('show-reset-toggle').checked;
  if (newShowReset !== showResetBtn) {
    showResetBtn = newShowReset;
    localStorage.setItem('show_reset_btn', showResetBtn ? 'true' : 'false');
    applyResetBtnVisibility();
  }
  // Set timer
  let secs = selectedPreset || 60;
  modal.classList.remove('open');
  resetTimer(secs);
  // stay paused after setting new time
});

// Close modal on overlay click
modal.addEventListener('click', e => {
  if (e.target === modal) {
    modal.classList.remove('open');
  }
});

let movieHistory = [];  // { title, drawing } — drawing is a locked dataURL or null
let movieIndex = -1;
let activeDrawingIndex = -1; // index that was being drawn when movie screen opened

const movieOverlay   = document.getElementById('movie-overlay');
const movieTitleText = document.getElementById('movie-title-text');
const movieCenterText = document.getElementById('movie-center-text');
const movieDrawingBg = document.getElementById('movie-drawing-bg');
const btnBack        = document.getElementById('btn-back-movie');
const btnForward     = document.getElementById('btn-forward-movie');
const btnReload      = document.getElementById('btn-reload-movie');

// Save canvas to index ONLY if no drawing is saved yet AND canvas has content
function isCanvasBlank() {
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 0; i < data.length; i += 4) {
    if (data[i] !== 255 || data[i+1] !== 255 || data[i+2] !== 255) return false;
  }
  return true;
}

function saveDrawingToIndex(idx) {
  if (idx < 0 || idx >= movieHistory.length) return;
  if (movieHistory[idx].drawing) return; // locked — never overwrite
  if (isCanvasBlank()) return;           // don't save blank canvases
  movieHistory[idx].drawing = canvas.toDataURL('image/png');
}

function updateNavBtns() {
  // Back: visible always once a movie has been shown, but greyed at index 0
  if (movieHistory.length === 0) {
    btnBack.classList.add('hidden');
    btnBack.classList.remove('disabled');
  } else {
    btnBack.classList.remove('hidden');
    btnBack.classList.toggle('disabled', movieIndex <= 0);
  }
  btnForward.classList.toggle('hidden', movieIndex >= movieHistory.length - 1);
}

function animateText(el) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}

function displayMovie(triggerAnim = true) {
  const entry = movieHistory[movieIndex];
  if (!entry) return;

  const hasDrawing = !!entry.drawing;

  // Set title in both places
  movieTitleText.textContent = entry.title;
  movieCenterText.textContent = entry.title;

  if (triggerAnim) {
    animateText(hasDrawing ? movieTitleText : movieCenterText);
  }

  // Show/hide drawing background
  if (hasDrawing) {
    movieDrawingBg.src = entry.drawing;
    movieOverlay.classList.add('has-drawing');
  } else {
    movieDrawingBg.src = '';
    movieOverlay.classList.remove('has-drawing');
  }

  updateNavBtns();
  movieOverlay.classList.add('show');
  document.getElementById('btn-movie-corner').classList.add('on-movie');
}

async function fetchPoster(title, idx) {
  if (!tmdbApiKey) return;
  if (movieHistory[idx] && movieHistory[idx].posterUrl !== undefined) return; // already fetched
  try {
    const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${tmdbApiKey}&query=${encodeURIComponent(title)}&language=en-US&page=1`);
    const data = await r.json();
    const result = data.results && data.results[0];
    if (movieHistory[idx]) {
      movieHistory[idx].posterUrl = result && result.poster_path
        ? `https://image.tmdb.org/t/p/w500${result.poster_path}`
        : null;
    }
  } catch(e) {
    if (movieHistory[idx]) movieHistory[idx].posterUrl = null;
  }
}

function showMovie() {
  // Do NOT save canvas here — saving only happens on timer expiry or checkmark
  const source = (typeof getMoviePool === 'function') ? getMoviePool() : MOVIES;
  const pool = source.filter(m => !movieHistory.map(e => e.title).includes(m));
  const available = pool.length > 0 ? pool : source;
  const pick = available[Math.floor(Math.random() * available.length)];
  movieHistory.push({ title: pick, drawing: null, posterUrl: undefined });
  movieIndex = movieHistory.length - 1;
  // Fetch poster in background
  fetchPoster(pick, movieIndex);
  displayMovie(true);
}

function hideMovie() {
  movieOverlay.classList.remove('show');
  document.getElementById('btn-movie-corner').classList.remove('on-movie');
  isDrawing = false;
}

function hideMovieWithContext() {
  // If returning to the title that was being drawn: resume timer, keep canvas
  // If returning to a different (no-drawing) title: save canvas to active title, clear, reset timer
  const returningToActive = movieIndex === activeDrawingIndex;
  hideMovie();
  if (!returningToActive) {
    // Save whatever was drawn to the title that was active before browsing
    saveDrawingToIndex(activeDrawingIndex);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    resetTimer(totalSeconds);
  } else {
    // Resume timer from where it was
    if (remaining > 0 && !timerRunning) {
      startTimer();
      updateResetBtn();
    }
  }
}

// ── Done (checkmark) button ──
document.getElementById('btn-done').addEventListener('click', () => {
  // Save current canvas to current movie (locks it), respects blank-check
  if (movieIndex >= 0) saveDrawingToIndex(movieIndex);
  // Pause timer but remember remaining time for cancel
  pauseTimer();
  // Show "Good moove!" interstitial — tap will clear canvas + reset timer + open movie screen
  showDone('goodmoove');
});

function navigateFromDrawingTitle() {
  // Same logic as tapping the overlay when on a title with a drawing
  const isAtEnd = movieIndex === movieHistory.length - 1;
  if (isAtEnd) {
    showMovie();
  } else {
    const lastEntry = movieHistory[movieHistory.length - 1];
    if (lastEntry.drawing) {
      showMovie();
    } else {
      movieIndex = movieHistory.length - 1;
      displayMovie(true);
    }
  }
}

function handleMovieBtn() {
  if (movieOverlay.classList.contains('show')) {
    const currentEntry = movieHistory[movieIndex];
    if (currentEntry && currentEntry.drawing) {
      navigateFromDrawingTitle();
    } else {
      hideMovieWithContext();
    }
  } else {
    // Record which index is active before opening
    activeDrawingIndex = movieIndex;
    if (movieIndex < 0) {
      showMovie();
    } else {
      displayMovie(false);
    }
  }
}
document.getElementById('btn-movie-corner').addEventListener('click', handleMovieBtn);

btnReload.addEventListener('click', (e) => {
  e.stopPropagation();
  showMovie();
});

btnBack.addEventListener('click', (e) => {
  e.stopPropagation();
  if (movieIndex > 0) {
    movieIndex--;
    displayMovie(true);
  }
});

btnForward.addEventListener('click', (e) => {
  e.stopPropagation();
  if (movieIndex < movieHistory.length - 1) {
    movieIndex++;
    displayMovie(true);
  }
});

// Tap backdrop to close/navigate — use current-view and drawing-bg as the tap targets
// so that stopPropagation on the title text elements reliably intercepts first
movieOverlay.addEventListener('click', (e) => {

  const settingsBtn = document.getElementById('btn-settings-movie');
  // Ignore nav buttons and settings button
  if (btnReload.contains(e.target)) return;
  if (navLeft.contains(e.target)) return;
  if (settingsBtn && settingsBtn.contains(e.target)) return;

  // Tap on title text → show poster
  if (movieTitleText.contains(e.target) || movieCenterText.contains(e.target)) {
    showPoster(movieIndex);
    return;
  }

  // Tap anywhere else → close/navigate
  const currentEntry = movieHistory[movieIndex];
  if (currentEntry && currentEntry.drawing) {
    navigateFromDrawingTitle();
  } else {
    hideMovieWithContext();
  }
});

// ── Poster popup ──
const posterPopup = document.getElementById('poster-popup');
const posterImg = document.getElementById('poster-img');
const posterTitle = document.getElementById('poster-title');

function showPoster(idx) {
  const entry = movieHistory[idx];
  if (!entry) return;
  const noKeyEl = document.getElementById('poster-no-key');
  const noKeySub = document.getElementById('poster-no-key-sub');

  // Always start with no-key box hidden, title shown
  posterTitle.textContent = entry.title;
  posterTitle.style.display = '';
  noKeyEl.style.display = 'none';
  posterImg.style.display = 'none';
  posterImg.classList.remove('loading');
  posterImg.src = '';

  if (!tmdbApiKey) {
    // No key at all
    noKeySub.textContent = 'Check TMDB settings ›';
    posterTitle.style.display = 'none';
    noKeyEl.style.display = 'flex';
  } else if (entry.posterUrl) {
    // Poster loaded — show it, no no-key box
    posterImg.style.display = 'block';
    posterImg.src = entry.posterUrl;
  } else if (entry.posterUrl === undefined) {
    // Still fetching
    posterImg.style.display = 'block';
    posterImg.classList.add('loading');
    const poll = setInterval(() => {
      if (!posterPopup.classList.contains('show')) { clearInterval(poll); return; }
      if (entry.posterUrl !== undefined) {
        clearInterval(poll);
        posterImg.classList.remove('loading');
        if (entry.posterUrl) {
          posterImg.src = entry.posterUrl;
          posterImg.style.display = 'block';
        } else {
          // Fetch finished but no poster found
          posterImg.style.display = 'none';
          noKeySub.textContent = 'Check TMDB settings ›';
          posterTitle.style.display = 'none';
          noKeyEl.style.display = 'flex';
        }
      }
    }, 300);
  } else {
    // posterUrl is null — no poster found
    noKeySub.textContent = 'Check TMDB settings ›';
    posterTitle.style.display = 'none';
    noKeyEl.style.display = 'flex';
  }
  posterPopup.classList.add('show');
}

document.getElementById('poster-no-key').addEventListener('click', (e) => {
  e.stopPropagation();
  posterPopup.classList.remove('show');
  // Open settings
  document.getElementById('tmdb-input').value = tmdbApiKey;
  document.getElementById('family-friendly-toggle').checked = familyFriendly;
  document.getElementById('english-only-toggle').checked = englishOnly;
  document.getElementById('tmdb-status').textContent = '';
  document.getElementById('tmdb-status').className = '';
  settingsOverlay.classList.add('open');
});

posterPopup.addEventListener('click', (e) => {
  // If tapping the blank/loading image box, retry fetching the poster
  if (posterImg.contains(e.target) && !posterImg.src && tmdbApiKey) {
    const idx = movieIndex;
    const entry = movieHistory[idx];
    if (entry) {
      entry.posterUrl = undefined; // reset so fetchPoster will try again
      posterImg.classList.add('loading');
      fetchPoster(entry.title, idx).then(() => {
        if (!posterPopup.classList.contains('show')) return;
        posterImg.classList.remove('loading');
        if (entry.posterUrl) {
          posterImg.style.display = 'block';
          posterImg.src = entry.posterUrl;
        }
      });
    }
    return;
  }
  posterPopup.classList.remove('show');
});

let familyFriendly = localStorage.getItem('family_friendly') === 'true';
let englishOnly = localStorage.getItem('english_only') === 'true';

async function fetchTmdbMovies(key, statusEl) {
  const status = statusEl || document.getElementById('tmdb-status');
  status.textContent = 'Fetching movies...';
  status.className = 'loading';
  try {
    const pages = [1, 2, 3, 4, 5];
    let urls;
    const langParam = englishOnly ? '&with_original_language=en' : '';
    if (familyFriendly) {
      const ratings = ['G', 'PG'];
      urls = ratings.flatMap(cert =>
        pages.map(p =>
          `https://api.themoviedb.org/3/discover/movie?api_key=${key}&language=en-US&certification_country=US&certification=${cert}&sort_by=popularity.desc${langParam}&page=${p}`
        )
      );
    } else {
      urls = pages.map(p =>
        englishOnly
          ? `https://api.themoviedb.org/3/discover/movie?api_key=${key}&language=en-US&sort_by=popularity.desc&with_original_language=en&page=${p}`
          : `https://api.themoviedb.org/3/movie/popular?api_key=${key}&language=en-US&page=${p}`
      );
    }
    const results = await Promise.all(urls.map(url =>
      fetch(url).then(r => { if (!r.ok) throw new Error('Bad response'); return r.json(); })
    ));
    const fetched = results.flatMap(r => (r.results || []).map(m => m.title));
    const base = familyFriendly ? FAMILY_MOVIES : MOVIES;
    // If englishOnly, also filter the base hardcoded list isn't needed (already English)
    // but filter any previously fetched non-English titles out
    tmdbMovies = [...new Set([...base, ...fetched])];
    status.textContent = `✓ ${tmdbMovies.length} movies in pool`;
    status.className = 'ok';
    return true;
  } catch (e) {
    status.textContent = 'Invalid key or network error';
    status.className = 'err';
    return false;
  }
}

function getMoviePool() {
  if (tmdbMovies.length > 0) return tmdbMovies;
  // No TMDb data: use family-friendly fallback or full list
  return familyFriendly ? FAMILY_MOVIES : MOVIES;
}

// Patch showMovie to use getMoviePool()
const _origShowMovie = showMovie;

const settingsOverlay = document.getElementById('settings-overlay');
const tmdbInput = document.getElementById('tmdb-input');

document.getElementById('btn-settings-movie').addEventListener('click', (e) => {
  e.stopPropagation();
  tmdbInput.value = tmdbApiKey;
  document.getElementById('family-friendly-toggle').checked = familyFriendly;
  document.getElementById('english-only-toggle').checked = englishOnly;
  const status = document.getElementById('tmdb-status');
  if (tmdbApiKey && tmdbMovies.length > 0) {
    status.textContent = `✓ ${tmdbMovies.length} movies loaded`;
    status.className = 'ok';
  } else if (tmdbApiKey) {
    status.textContent = 'Key saved — not yet fetched';
    status.className = 'loading';
  } else {
    status.textContent = '';
    status.className = '';
  }
  settingsOverlay.classList.add('open');
});

document.getElementById('settings-cancel').addEventListener('click', () => {
  settingsOverlay.classList.remove('open');
});

document.getElementById('btn-tmdb-refresh').addEventListener('click', async (e) => {
  e.stopPropagation();
  const key = tmdbInput.value.trim() || tmdbApiKey;
  if (!key) {
    const status = document.getElementById('tmdb-status');
    status.textContent = 'Enter an API key first';
    status.className = 'err';
    return;
  }
  await fetchTmdbMovies(key);
});

function refreshCurrentMovieTitle() {
  // Replace the current movie title with one from the updated pool (only if no drawing saved yet)
  if (movieIndex >= 0 && !movieHistory[movieIndex].drawing) {
    const source = getMoviePool();
    const used = movieHistory.map((e, i) => i !== movieIndex ? e.title : null).filter(Boolean);
    const pool = source.filter(m => !used.includes(m));
    const available = pool.length > 0 ? pool : source;
    const pick = available[Math.floor(Math.random() * available.length)];
    movieHistory[movieIndex].title = pick;
    activeDrawingIndex = movieIndex;
    // If movie overlay is open, refresh the display
    if (movieOverlay.classList.contains('show')) {
      displayMovie(false);
    }
  }
}

document.getElementById('settings-save').addEventListener('click', async () => {
  const key = tmdbInput.value.trim();
  const ffChecked = document.getElementById('family-friendly-toggle').checked;
  const eoChecked = document.getElementById('english-only-toggle').checked;
  const ffChanged = ffChecked !== familyFriendly;
  const eoChanged = eoChecked !== englishOnly;
  const settingsChanged = ffChanged || eoChanged;
  // Clear stale tmdb cache if any filter changed
  if (settingsChanged) {
    tmdbMovies = [];
  }
  familyFriendly = ffChecked;
  englishOnly = eoChecked;
  localStorage.setItem('family_friendly', ffChecked ? 'true' : 'false');
  localStorage.setItem('english_only', eoChecked ? 'true' : 'false');
  // Clear tmdb cache if no key
  if (!key) {
    tmdbApiKey = '';
    tmdbMovies = [];
    localStorage.removeItem('tmdb_api_key');
    document.getElementById('tmdb-status').textContent = 'Saved';
    document.getElementById('tmdb-status').className = 'ok';
    setTimeout(() => {
      settingsOverlay.classList.remove('open');
      if (settingsChanged) refreshCurrentMovieTitle();
    }, 800);
    return;
  }
  const ok = await fetchTmdbMovies(key);
  if (ok) {
    tmdbApiKey = key;
    localStorage.setItem('tmdb_api_key', key);
    setTimeout(() => {
      settingsOverlay.classList.remove('open');
      if (settingsChanged) refreshCurrentMovieTitle();
    }, 900);
  }
});

settingsOverlay.addEventListener('click', (e) => {
  if (e.target === settingsOverlay) settingsOverlay.classList.remove('open');
});

// On launch: if key stored, fetch movies silently (no visible status update)
if (tmdbApiKey) {
  const silentStatus = document.createElement('span');
  fetchTmdbMovies(tmdbApiKey, silentStatus).catch(() => {});
}
